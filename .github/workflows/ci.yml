name: CI

on:
  pull_request:

jobs:
  backend-checks:
    name: Backend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  frontend-checks:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 16
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

  e2e-checks:
    name: E2E Checks
    runs-on: ubuntu-latest
    needs: [backend-checks, frontend-checks]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Create env file
        run: |
          cat > backend/config/.env.dev << 'EOF'
          NODE_ENV=dev
          PORT=3000
          MONGO_URI=mongodb://mongo-dev:27017/project_yum_recipes
          EOF

      - name: Start Docker stack
        run: docker compose -f docker-compose.dev.yml up -d --build

      - name: Show Docker logs
        run: |
          echo "=== BACKEND ==="
          docker compose -f docker-compose.dev.yml logs backend
          echo "=== FRONTEND ==="
          docker compose -f docker-compose.dev.yml logs frontend
          echo "=== NGINX ==="
          docker compose -f docker-compose.dev.yml logs nginx
          echo "=== MONGO ==="
          docker compose -f docker-compose.dev.yml logs mongo-dev

      - name: Wait for stack to be ready
        run: |
          echo "Waiting for backend API..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:80/api/recipes)
            if [ "$STATUS" = "200" ]; then
              echo "Backend ready (HTTP 200)"
              exit 0
            fi
            echo "Attempt $i — HTTP $STATUS, retrying..."
            sleep 5
          done
          echo "Backend never became ready — aborting"
          exit 1

      - name: Wait for frontend to be ready
        run: |
          echo "Waiting for frontend..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:80)
            if [ "$STATUS" = "200" ]; then
              echo "Frontend ready (HTTP 200)"
              exit 0
            fi
            echo "Attempt $i — HTTP $STATUS, retrying..."
            sleep 5
          done
          echo "Frontend never became ready — aborting"
          exit 1

      - name: Install Playwright
        working-directory: e2e
        run: npm install && npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: e2e
        run: npm test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

      - name: Tear down Docker stack
        if: always()
        run: docker compose -f docker-compose.dev.yml down
