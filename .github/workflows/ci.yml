name: CI

on:
  pull_request:

jobs:
  backend-checks:
    name: Backend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  frontend-checks:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 16
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

  e2e-checks:
    name: E2E Checks
    runs-on: ubuntu-latest
    needs: [backend-checks, frontend-checks]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Start Docker stack
        run: |
          echo "::group::Docker build + start"
          docker compose -f docker-compose.ci.yml up -d --build
          echo "::endgroup::"

      - name: Wait for stack to be ready
        run: |
          echo "::group::Health check"
          # retry up to 30 times (5s apart = 2.5 min max). first attempt may fail while containers are still starting up — that's fine
          # require REQUIRED_CONSECUTIVE 200s in a row to confirm the stack is stable, not just briefly up
          REQUIRED_CONSECUTIVE=2
          CONSECUTIVE=0
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:80/api/recipes)
            if [ "$STATUS" = "200" ]; then
              CONSECUTIVE=$((CONSECUTIVE + 1))
              echo "✅ Got 200 ($CONSECUTIVE/$REQUIRED_CONSECUTIVE)"
              if [ "$CONSECUTIVE" = "$REQUIRED_CONSECUTIVE" ]; then
                echo "✅ Backend stable ($REQUIRED_CONSECUTIVE consecutive 200s)"
                echo "::endgroup::"
                exit 0
              fi
            else
              CONSECUTIVE=0
              echo "⏳ Attempt $i — HTTP $STATUS, retrying..."
            fi
            sleep 5
          done
          echo "❌ Backend never became ready — aborting"
          echo "::endgroup::"
          docker compose -f docker-compose.ci.yml logs
          exit 1

      - name: Docker logs
        if: always()
        run: |
          echo "::group::Docker container logs"
          docker compose -f docker-compose.ci.yml logs
          echo "::endgroup::"

      - name: Install Playwright
        working-directory: e2e
        run: npm install && npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: e2e
        run: npm test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

      - name: Tear down Docker stack
        if: always()
        run: docker compose -f docker-compose.ci.yml down
