services:
  mongo-prod:
    image: mongo:5
    container_name: project-yum-mongo-prod
    volumes:
      - mongo-prod-data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: project-yum-backend-prod
    env_file:
      - ./backend/config/.env.prod
    depends_on:
      - mongo-prod

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: project-yum-frontend-prod

  nginx:
    image: nginx:alpine
    container_name: project-yum-nginx-prod
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend

volumes:
  mongo-prod-data:
