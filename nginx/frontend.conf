# Nginx config for the frontend container in Kubernetes.
#
# The Angular app is compiled to static files during the Docker build (multi-stage).
# Those files land in /usr/share/nginx/html inside the container.
# This config tells Nginx how to serve them.
#
# The key line is `try_files $uri $uri/ /index.html`:
#
#   $uri is an Nginx variable that holds the path from the browser's request.
#   Examples of what $uri resolves to:
#     - Browser requests http://localhost/shopping-list    → $uri = /shopping-list
#     - Browser requests http://localhost/                 → $uri = /
#     - Browser requests http://localhost/main.abc123.js   → $uri = /main.abc123.js
#     - Browser requests http://localhost/assets/logo.png  → $uri = /assets/logo.png
#
#   try_files checks each argument in order and serves the first match:
#     1. $uri        — try to serve a real file at that path (e.g. /main.abc123.js exists on disk → serve it)
#     2. $uri/       — try it as a directory and serve its index file
#     3. /index.html — if neither exists, serve index.html as a fallback
#
#   This fallback is what makes Angular client-side routing work.
#   /shopping-list doesn't exist as a real file on disk — it's an Angular route.
#   Without the fallback, Nginx returns 404. With it, Nginx serves index.html,
#   the Angular app boots, reads the URL, and renders the correct page.
#
# Why Kubernetes needs this but Docker Compose does not:
#
#   In Docker Compose (dev), the frontend container runs `ng serve` — Angular's
#   own dev server. That server already knows about Angular routes and handles
#   the fallback internally. The browser talks to ng serve directly (port 4200)
#   or via the Nginx reverse proxy, but either way ng serve handles routing.
#
#   In Kubernetes (production), there is no ng serve. The frontend Dockerfile
#   does a multi-stage build: stage 1 compiles the Angular app into static files
#   (HTML, JS, CSS), stage 2 copies those files into a plain Nginx container.
#   Nginx has no idea what Angular routes are — it only knows about files on disk.
#   So without this config, any direct navigation or page refresh on an Angular
#   route (e.g. /shopping-list, /recipes/123) returns 404.
#
# This config is ONLY used in the Kubernetes (production) build.
# Referenced by: frontend/Dockerfile (COPY nginx/frontend.conf ...)

server {
    # Listen on port 80 inside the container.
    # The Kubernetes Service maps external traffic to this port.
    listen 80;

    # Where the compiled Angular files live after the multi-stage Docker build.
    root /usr/share/nginx/html;

    # Default file to serve when a directory is requested.
    index index.html;

    location / {
        # Serve static files first, fall back to index.html for Angular routes.
        # See explanation above.
        try_files $uri $uri/ /index.html;
    }
}
