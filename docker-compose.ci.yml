services:
  mongo-dev:
    image: mongo:5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=dev
      - PORT=3000
      - MONGO_URI=mongodb://mongo-dev:27017/project_yum_recipes
    depends_on:
      - mongo-dev

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.ci.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
