<div *ngIf="recipe; else notFoundOrLoading">
    <div class="card border-0 shadow-sm">
        <img src="{{ recipe.imgPath }}" alt="{{ recipe.name }}" class="card-img-top rounded-top" style="height: 250px; object-fit: cover;">
        <div class="card-body p-4">
            <div class="d-flex justify-content-between align-items-start mb-3">
                <h2 class="card-title fw-bold mb-0">{{ recipe.name }}</h2>
                <div class="dropdown" [appDropdown]="1">
                    <button type="button" class="btn btn-outline-secondary btn-sm dropdown-toggle">
                        Manage
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" (click)="onAddToShoppingList()" style="cursor: pointer;">Add to Shopping List</a></li>
                        <li><a class="dropdown-item" (click)="onEditRecipe()" style="cursor: pointer;">Edit Recipe</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger" (click)="onDeleteRecipe()" style="cursor: pointer;">Delete Recipe</a></li>
                    </ul>
                </div>
            </div>
            <p class="text-muted mb-4">{{ recipe.desc }}</p>
            <h6 class="fw-semibold mb-2">Ingredients</h6>
            <ul class="list-group list-group-flush">
                <li class="list-group-item px-0" *ngFor="let ingredient of recipe.ingredients">
                    {{ ingredient.name }} <span class="text-muted">— {{ ingredient.amount }}</span>
                </li>
            </ul>
        </div>
    </div>
</div>
<ng-template #notFoundOrLoading>
    <div *ngIf="notFound; else loading" class="d-flex flex-column align-items-center justify-content-center py-5 text-muted">
        <p class="fs-5">Recipe not found.</p>
        <a routerLink="/recipe" class="btn btn-sm btn-outline-secondary mt-2">Back to Recipes</a>
    </div>
    <ng-template #loading>
        <div class="d-flex justify-content-center py-5">
            <div class="spinner-border text-secondary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </ng-template>
</ng-template>
