<div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="fw-semibold mb-0">Recipes</h5>
    <button class="btn btn-dark btn-sm" (click)="onNewRecipe()">+ New Recipe</button>
</div>
<div class="list-group">
    <app-recipe-items *ngFor="let recipe of Recipes; let i = index" [index]="i" [recipeItem]="recipe"></app-recipe-items>
</div>
