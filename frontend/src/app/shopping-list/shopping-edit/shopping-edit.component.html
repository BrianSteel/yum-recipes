<form (ngSubmit)="onSubmitItem(f)" #f="ngForm">
    <div class="row g-3 mb-3">
        <div class="col-sm-7">
            <label for="name" class="form-label">Name</label>
            <input
                type="text"
                id="name"
                class="form-control"
                name="name"
                ngModel
                required
            >
        </div>
        <div class="col-sm-3">
            <label for="amount" class="form-label">Amount</label>
            <input
                type="number"
                min="1"
                id="amount"
                class="form-control"
                name="amount"
                ngModel
                required
                [pattern]="'[1-9]+[0-9]*$'"
            >
        </div>
    </div>
    <div class="d-flex gap-2">
        <button
            class="btn btn-sm"
            [ngClass]="editMode ? 'btn-warning' : 'btn-success'"
            type="submit"
            [disabled]="!f.valid"
        >
            {{ editMode ? 'Update' : 'Add' }}
        </button>
        <button class="btn btn-sm btn-danger" *ngIf="editMode" type="button" (click)="onDeleteItem()">Delete</button>
        <button class="btn btn-sm btn-outline-secondary" type="button" (click)="clearInputs()">Clear</button>
    </div>
</form>
